<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant PAN Find Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .search-card { max-width: 500px; margin: 80px auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); background: #fff; }
        .result-box { display: none; margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-card text-center">
        <h3 class="mb-4 text-primary">Instant PAN Find</h3>
        <p class="text-muted small">आधार नंबर डालें और तुरंत पैन नंबर प्राप्त करें</p>
        
        <div class="mb-3 text-start">
            <label for="aadhaarInput" class="form-label font-semibold">Aadhaar Number</label>
            <input type="text" class="form-control form-control-lg" id="aadhaarInput" placeholder="XXXX XXXX XXXX" maxlength="12">
        </div>
        
        <button class="btn btn-primary btn-lg w-100" id="searchBtn" onclick="findPanCard()">Search PAN</button>

        <div id="loading" class="text-muted mt-3" style="display: none;">
            <div class="spinner-border spinner-border-sm text-primary" role="status"></div> कृपया प्रतीक्षा करें...
        </div>

        <div id="resultBox" class="result-box"></div>
    </div>
</div>

<script>
async function findPanCard() {
    const aadhaar = document.getElementById('aadhaarInput').value;
    const resultBox = document.getElementById('resultBox');
    const loading = document.getElementById('loading');
    const searchBtn = document.getElementById('searchBtn');

    if (aadhaar.length !== 12 || isNaN(aadhaar)) {
        alert("कृपया सही 12 अंकों का आधार नंबर डालें।");
        return;
    }

    // लोडिंग चालू करें
    loading.style.display = 'block';
    resultBox.style.display = 'none';
    searchBtn.disabled = true;

    try {
        // 🔴 यहाँ यह HTML आपके बनाए हुए Vercel Node.js API को हिट करेगा
        const response = await fetch('/api/findpan', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ aadhaar_number: aadhaar })
        });

        const data = await response.json();

        // लोडिंग बंद करें
        loading.style.display = 'none';
        searchBtn.disabled = false;

        if (data.status === 'success') {
            resultBox.className = "result-box alert alert-success";
            resultBox.innerHTML = `🎉 PAN Number Found: <span class="text-danger font-bold d-block fs-4 mt-1">${data.pan_number}</span>`;
            resultBox.style.display = 'block';
        } else {
            resultBox.className = "result-box alert alert-danger";
            resultBox.innerText = data.message || "पैन नंबर नहीं मिला।";
            resultBox.style.display = 'block';
        }

    } catch (error) {
        loading.style.display = 'none';
        searchBtn.disabled = false;
        resultBox.className = "result-box alert alert-danger";
        resultBox.innerText = "सर्वर से कनेक्ट करने में समस्या आई।";
        resultBox.style.display = 'block';
    }
}
</script>
</body>
</html>
